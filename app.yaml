AWSTemplateFormatVersion: '2010-09-09'
Description: 'Step 3: ALB and Auto Scaling Group with Apache'

Parameters:
  NetworkStackName:
    Type: String
    Default: "aws-cfn-autoscale-web-hy-network"
  SecurityStackName:
    Type: String
    Default: "aws-cfn-autoscale-web-hy-security"

Resources:
  # 1. Target Group
  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      VpcId: { "Fn::ImportValue": !Sub "${NetworkStackName}-VPCID" }
      Protocol: HTTP
      Port: 80
      TargetType: instance
      HealthCheckProtocol: HTTP
      HealthCheckPath: /index.html
      Matcher:
        HttpCode: 200

  # 2. Application Load Balancer
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Scheme: internet-facing
      SecurityGroups:
        - { "Fn::ImportValue": !Sub "${SecurityStackName}-ALBSG" }
      Subnets:
        - { "Fn::ImportValue": !Sub "${NetworkStackName}-PublicSubnet1" }
        - { "Fn::ImportValue": !Sub "${NetworkStackName}-PublicSubnet2" }

  # 3. ALB Listener
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  # 4. Launch Template (The "Recipe" for EC2)
  WebLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-launch-template"
      LaunchTemplateData:
        ImageId: ami-0d52744d6551d851e # Amazon Linux 2023 (ap-northeast-1)
        InstanceType: t2.micro
        SecurityGroupIds:
          - { "Fn::ImportValue": !Sub "${SecurityStackName}-WebserverSG" }
        UserData:
          Fn::Base64: |
            #!/bin/bash
            dnf install -y httpd
            systemctl start httpd
            systemctl enable httpd
            echo "<h1>Hello from AWS Hands-on Project!</h1>" > /var/lib/cloud/instance/scripts/index.html
            # index.htmlを適切な場所に配置
            cp /var/lib/cloud/instance/scripts/index.html /var/lib/html/index.html || echo "<h1>Working!</h1>" > /var/www/html/index.html

  # 5. Auto Scaling Group
  WebASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${AWS::StackName}-asg"
      VPCZoneIdentifier:
        - { "Fn::ImportValue": !Sub "${NetworkStackName}-PublicSubnet1" }
        - { "Fn::ImportValue": !Sub "${NetworkStackName}-PublicSubnet2" }
      LaunchTemplate:
        LaunchTemplateId: !Ref WebLaunchTemplate
        Version: !GetAtt WebLaunchTemplate.LatestVersionNumber
      MinSize: '2'
      MaxSize: '4'
      DesiredCapacity: '2'
      TargetGroupARNs:
        - !Ref WebTargetGroup

Outputs:
  ALBDNSName:
    Description: "URL of the ALB"
    Value: !GetAtt ALB.DNSName