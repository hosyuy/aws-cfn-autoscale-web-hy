AWSTemplateFormatVersion: '2010-09-09'
Description: 'Portfolio Project: Master Stack for Multi-AZ Web Infrastructure using Nested Stacks'

# ==============================================================================
# 設計思想: 疎結合なモジュール管理 (Loosely Coupled Modules)
# テンプレートを分離することで、各レイヤーの独立性を高め、メンテナンスコストを削減します。
# ==============================================================================

Parameters:
  SystemName:
    Type: String
    Default: "my-portfolio-app"
    Description: "リソースの命名規則およびスタック間参照（Export/Import）の共通プレフィックス"

Resources:
  # ------------------------------------------------------------
  # 1. ネットワークレイヤー (VPC & Subnets)
  # マルチAZを考慮した基盤インフラを構築。
  # 可用性を高めるため、パブリックおよびプライベートサブネットを各AZに配置。
  # ------------------------------------------------------------
  NetworkStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      # S3バケットにアップロードしたテンプレートのURLを指定
      TemplateURL: ./network.yaml
      Parameters:
        SystemName: !Ref SystemName

  # ------------------------------------------------------------
  # 2. セキュリティレイヤー (Security Groups)
  # 最小権限の原則（Principle of Least Privilege）に基づき、
  # ALB用およびEC2用のセキュリティグループを定義。
  # ------------------------------------------------------------
  SecurityStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: NetworkStack # ネットワーク基盤の完成を待機
    Properties:
      TemplateURL: ./security.yaml
      Parameters:
        SystemName: !Ref SystemName

  # ------------------------------------------------------------
  # 3. アプリケーションレイヤー (ALB, ASG, EC2)
  # スケーラビリティを担保するため、Auto Scaling Groupと
  # Application Load Balancerを組み合わせた高可用性Webサーバーをデプロイ。
  # ------------------------------------------------------------
  AppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack # セキュリティ設定の完了を待機
    Properties:
      TemplateURL: ./app.yaml
      Parameters:
        SystemName: !Ref SystemName