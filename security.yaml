AWSTemplateFormatVersion: '2010-09-09'
Description: 'Step 2: Security Groups for ALB and EC2 - High Availability Web Base'

Parameters:
  # Networkスタックの名前を引数で受け取るようにします
  NetworkStackName:
    Type: String
    Default: "aws-cfn-autoscale-web-hy-network"
    Description: "Name of the network stack to import VPC ID"

Resources:
  # 1. ALB (Load Balancer) Security Group
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP from the internet"
      # Import from the Network Stack
      VpcId: 
        Fn::ImportValue: !Sub "${NetworkStackName}-VPCID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-alb-sg"

  # 2. Web Server (EC2) Security Group
  WebserverSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP only from ALB"
      VpcId: 
        Fn::ImportValue: !Sub "${NetworkStackName}-VPCID"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          # This is the "Gold Standard" - Security Group Chaining
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-web-sg"

Outputs:
  ALBSG:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-ALBSG"
  WebserverSG:
    Value: !Ref WebserverSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-WebserverSG"